<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Cashback</title>
</head>
<body>
    <h1>Calculadora de Cashback</h1>

    <label for="tipo">Tipo de cliente:</label>
    <select id="tipo">
        <option value="comum">Comum</option>
        <option value="vip">VIP</option>
    </select>

    <br><br>

    <label for="valor">Valor da Compra:</label>
    <input type="number" id="valor" placeholder="Ex: 600">

    <br><br>

    <label for="desconto">Desconto (%):</label>
    <input type="number" id="desconto" placeholder="Ex: 10">

    <br><br>

    <button onclick="calcularCashback()">Calcular cashback</button>

    <h2>Resultado</h2>
    <p id="resultado">Nenhum cálculo realizado ainda.</p>

    <h2>Histórico do meu IP</h2>
    <ul id="historico"></ul>

    <script>
        async function calcularCashback(){
            const tipo = document.getElementById("tipo").value;
            const valor = Number(document.getElementById("valor").value);
            const desconto = Number(document.getElementById("desconto").value);

            const resposta = await fetch("http://127.0.0.1:5000/cashback", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    tipo_cliente: tipo,
                    valor: valor,
                    desconto: desconto
                })
            });

            const dados = await resposta.json();

            document.getElementById("resultado").innerText = `Cashback calculado: R$ ${dados.cashback.toFixed(2)}`;

            carregarHistorico();

        }

        async function carregarHistorico() {
            const resposta = await fetch("http://127.0.0.1:5000/historico");
            const dados = await resposta.json(); 

            const lista = document.getElementById("historico");
            lista.innerHTML = "";

            dados.forEach(item => {
                const li = document.createElement("li");
                li.innerText = `Tipo: ${item[0]} | Valor: R$ ${item[1]} | Cashback: R$ ${item[2]}`;
                lista.appendChild(li);
            });
        }

        carregarHistorico();
    </script>


</body>
</html>
